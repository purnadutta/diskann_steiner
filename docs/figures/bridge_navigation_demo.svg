<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" width="1200" height="520" role="img" aria-labelledby="title desc">
  <title id="title">Connected graph with and without a bridge Steiner node</title>
  <desc id="desc">Two connected graphs. On the left, greedy traversal gets trapped in a dead end even though the graph is connected. On the right, adding one bridge Steiner node creates a navigable route to the target.</desc>
  <style>
    .bg { fill: #f6f2eb; }
    .panel { fill: #fffdf9; stroke: #d8cfbf; stroke-width: 2; }
    .heading { font: 700 25px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #222; }
    .subtle { font: 500 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #766b5f; }
    .edge { stroke: #c7beb2; stroke-width: 3; stroke-linecap: round; }
    .node { fill: #3f6ea8; stroke: #27486d; stroke-width: 2.4; }
    .start { fill: #c63a55; stroke: #8b2137; stroke-width: 3; }
    .target-ring { fill: none; stroke: #1f8c61; stroke-width: 5; }
    .target-core { fill: #1f8c61; }
    .path { stroke: #cc4b37; stroke-width: 8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .visit { fill: #cc4b37; }
    .deadend { fill: none; stroke: #cc4b37; stroke-width: 5; }
    .bridge-edge { stroke: #ca8432; stroke-width: 5; stroke-linecap: round; }
    .bridge-node { fill: #ea9742; stroke: #975c1f; stroke-width: 3; }
    .success { fill: none; stroke: #1f8c61; stroke-width: 5; }
  </style>

  <rect class="bg" width="1200" height="520" rx="28" />

  <text class="heading" x="70" y="54">Connected graph, greedy path gets trapped</text>
  <text class="heading" x="650" y="54">Same graph plus one bridge node</text>
  <text class="subtle" x="396" y="490">orange = routing-only Steiner bridge</text>

  <g transform="translate(40,84)">
    <rect class="panel" x="0" y="0" rx="26" ry="26" width="520" height="360" />

    <g transform="translate(8,18) scale(0.73,0.92)">
    <g class="edge">
      <line x1="90" y1="240" x2="140" y2="170" />
      <line x1="90" y1="240" x2="145" y2="315" />
      <line x1="140" y1="170" x2="220" y2="205" />
      <line x1="145" y1="315" x2="220" y2="205" />
      <line x1="220" y1="205" x2="285" y2="135" />
      <line x1="220" y1="205" x2="290" y2="300" />
      <line x1="285" y1="135" x2="360" y2="165" />
      <line x1="290" y1="300" x2="380" y2="320" />
      <line x1="380" y1="320" x2="455" y2="255" />
      <line x1="455" y1="255" x2="520" y2="185" />
      <line x1="455" y1="255" x2="535" y2="335" />
      <line x1="520" y1="185" x2="590" y2="215" />
      <line x1="535" y1="335" x2="610" y2="305" />
      <line x1="590" y1="215" x2="610" y2="305" />
    </g>

    <g>
      <circle class="start" cx="90" cy="240" r="12" />
      <circle class="node" cx="140" cy="170" r="10" />
      <circle class="node" cx="145" cy="315" r="10" />
      <circle class="node" cx="220" cy="205" r="10" />
      <circle class="node" cx="285" cy="135" r="10" />
      <circle class="node" cx="290" cy="300" r="10" />
      <circle class="node" cx="360" cy="165" r="10" />
      <circle class="node" cx="380" cy="320" r="10" />
      <circle class="node" cx="455" cy="255" r="10" />
      <circle class="node" cx="520" cy="185" r="10" />
      <circle class="node" cx="535" cy="335" r="10" />
      <circle class="node" cx="590" cy="215" r="10" />
      <circle class="node" cx="610" cy="305" r="10" />
      <circle class="target-ring" cx="590" cy="215" r="18" />
      <circle class="target-core" cx="590" cy="215" r="5" />
    </g>

    <g>
      <polyline class="path" points="90,240 140,170 220,205 285,135 360,165" />
      <circle class="visit" cx="140" cy="170" r="7" />
      <circle class="visit" cx="220" cy="205" r="7" />
      <circle class="visit" cx="285" cy="135" r="7" />
      <circle class="visit" cx="360" cy="165" r="7" />
      <circle class="deadend" cx="360" cy="165" r="22" />
    </g>
    </g>
  </g>

  <g transform="translate(640,84)">
    <rect class="panel" x="0" y="0" rx="26" ry="26" width="520" height="360" />

    <g transform="translate(8,18) scale(0.73,0.92)">
    <g class="edge">
      <line x1="90" y1="240" x2="140" y2="170" />
      <line x1="90" y1="240" x2="145" y2="315" />
      <line x1="140" y1="170" x2="220" y2="205" />
      <line x1="145" y1="315" x2="220" y2="205" />
      <line x1="220" y1="205" x2="285" y2="135" />
      <line x1="220" y1="205" x2="290" y2="300" />
      <line x1="285" y1="135" x2="360" y2="165" />
      <line x1="290" y1="300" x2="380" y2="320" />
      <line x1="380" y1="320" x2="455" y2="255" />
      <line x1="455" y1="255" x2="520" y2="185" />
      <line x1="455" y1="255" x2="535" y2="335" />
      <line x1="520" y1="185" x2="590" y2="215" />
      <line x1="535" y1="335" x2="610" y2="305" />
      <line x1="590" y1="215" x2="610" y2="305" />
      <line class="bridge-edge" x1="360" y1="165" x2="475" y2="165" />
      <line class="bridge-edge" x1="475" y1="165" x2="520" y2="185" />
    </g>

    <g>
      <circle class="start" cx="90" cy="240" r="12" />
      <circle class="node" cx="140" cy="170" r="10" />
      <circle class="node" cx="145" cy="315" r="10" />
      <circle class="node" cx="220" cy="205" r="10" />
      <circle class="node" cx="285" cy="135" r="10" />
      <circle class="node" cx="290" cy="300" r="10" />
      <circle class="node" cx="360" cy="165" r="10" />
      <circle class="node" cx="380" cy="320" r="10" />
      <circle class="node" cx="455" cy="255" r="10" />
      <circle class="node" cx="520" cy="185" r="10" />
      <circle class="node" cx="535" cy="335" r="10" />
      <circle class="node" cx="590" cy="215" r="10" />
      <circle class="node" cx="610" cy="305" r="10" />
      <circle class="bridge-node" cx="475" cy="165" r="12" />
      <circle class="target-ring" cx="590" cy="215" r="18" />
      <circle class="target-core" cx="590" cy="215" r="5" />
    </g>

    <g>
      <polyline class="path" points="90,240 140,170 220,205 285,135 360,165 475,165 520,185 590,215" />
      <circle class="visit" cx="140" cy="170" r="7" />
      <circle class="visit" cx="220" cy="205" r="7" />
      <circle class="visit" cx="285" cy="135" r="7" />
      <circle class="visit" cx="360" cy="165" r="7" />
      <circle class="visit" cx="475" cy="165" r="7" />
      <circle class="visit" cx="520" cy="185" r="7" />
      <circle class="visit" cx="590" cy="215" r="7" />
      <circle class="success" cx="590" cy="215" r="28" />
    </g>
    </g>
  </g>
</svg>
